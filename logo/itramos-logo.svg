<svg viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg" width="240" height="80">
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00d4ff" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Cloud shape -->
  <path d="M58 55H22c-4.4 0-8-3.6-8-8 0-4 2.9-7.3 6.8-7.9C21.3 31 27.5 25 35 25c6 0 11.2 3.6 13.6 8.8C52 33 56.5 37 57.5 42c3 1 5 3.9 5 7 0 3.3-1.8 6-4.5 6z"
        fill="url(#cloudGrad)" filter="url(#glow)"/>

  <!-- Lightning bolt -->
  <path d="M38 29 L31 43h7L34.5 57 45 41h-7z" fill="#ffffff" opacity="0.95"/>

  <!-- Glow line below cloud -->
  <rect x="18" y="60" width="46" height="3" rx="1.5" fill="url(#cloudGrad)" opacity="0.4"/>

  <!-- Wordmark ITRAMOS -->
  <text x="78" y="53"
        font-family="'Orbitron', 'Exo', 'Rajdhani', sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="3"
        fill="url(#textGrad)"
        filter="url(#textShadow)">ITRAMOS</text>

  <!-- Tagline -->
  <text x="79" y="67"
        font-family="'Inter', 'Segoe UI', sans-serif"
        font-size="9"
        font-weight="400"
        letter-spacing="2.5"
        fill="#5a8aaa"
        text-anchor="start">MANAGED IT SERVICES</text>
</svg>
